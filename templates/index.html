<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>交易平台</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 24px; line-height: 1.5; }
        .card { border: 1px solid #ddd; border-radius: 10px; padding: 14px 16px; margin-bottom: 16px; }
        .badge { display: inline-block; padding: 4px 10px; border-radius: 999px; font-size: 12px; font-weight: bold; }
        .badge.running { background: #e8f8ef; color: #0a7d3e; }
        .badge.stopped { background: #fceaea; color: #c62828; }
        .meta { color: #666; font-size: 14px; margin-top: 6px; }
        .position-row { margin-bottom: 8px; }
        button { margin-left: 8px; }
        .symbol-form { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
        .symbol-form input { flex: 1; min-width: 280px; padding: 8px 10px; }
        .hint { color: #666; font-size: 13px; margin-top: 6px; }
    </style>
</head>
<body>
    <h1>交易平台</h1>

    <div class="card">
        <div id="status-text">載入中...</div>
        <div id="status-meta" class="meta"></div>
    </div>

    <div class="card">
        <strong>幣種池管理</strong>
        <div class="hint">輸入 10 個幣種，若某幣種仍在交易中，系統會先保留它，不會強制替換。</div>
        <div class="symbol-form">
            <input id="symbol-input" type="text" placeholder="例如: XRPUSDT,DOGEUSDT,ADAUSDT" />
            <button id="apply-symbols-btn" type="button">套用幣種池</button>
        </div>
        <div id="symbol-status" class="meta"></div>
    </div>

    <div id="position-info" class="card"></div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $(document).ready(function() {
            function renderStatus(botStatus, positions) {
                const statusText = $('#status-text');
                const statusMeta = $('#status-meta');
                const positionDiv = $('#position-info');
                positionDiv.empty();

                const hasOpenPosition = Object.values(positions || {}).some(function(position) {
                    return Number(position.quantity || position.qty || 0) > 0;
                });

                let stateText = '機器人已停止';
                let stateClass = 'stopped';
                if (botStatus && botStatus.is_running) {
                    stateText = hasOpenPosition ? '已開倉' : '監控中，等待進場';
                    stateClass = 'running';
                }

                statusText.html(`<span class="badge ${stateClass}">${stateText}</span>`);

                const metaItems = [];
                if (botStatus) {
                    metaItems.push(`機器人: ${botStatus.is_running ? '運行中' : '已停止'}`);
                    if (botStatus.active_symbols && botStatus.active_symbols.length) {
                        metaItems.push(`目標幣種: ${botStatus.active_symbols.join(', ')}`);
                    }
                    if (botStatus.regime) {
                        metaItems.push(`市場狀態: ${botStatus.regime}`);
                    }
                }
                statusMeta.text(metaItems.join(' | '));

                const symbols = Object.keys(positions || {});
                if (symbols.length === 0) {
                    positionDiv.append('<div class="position-row">目前沒有持倉資料</div>');
                    return;
                }

                symbols.forEach(function(symbol) {
                    let position = positions[symbol] || {};
                    let quantity = Number(position.quantity || position.qty || 0);
                    let row = $('<div class="position-row"></div>');

                    if (quantity > 0) {
                        row.append(`<span>${symbol}: ${quantity} (${position.position_side || '持倉中'})</span>`);
                        let closeButton = $('<button type="button">平倉</button>');
                        closeButton.click(function() {
                            alert(`${symbol} 平倉操作已觸發！`);
                        });
                        row.append(closeButton);
                    } else {
                        row.append(`<span>${symbol}: 已完成交易</span>`);
                    }

                    positionDiv.append(row);
                });
            }

            function updateStatus() {
                $.when(
                    $.get('/api/bot-status'),
                    $.get('/api/positions')
                ).done(function(botStatus, positions) {
                    renderStatus(botStatus[0], positions[0]);
                }).fail(function() {
                    $('#status-text').text('讀取狀態失敗');
                    $('#status-meta').text('請確認服務是否正常啟動');
                });
            }

            $('#apply-symbols-btn').click(function() {
                const value = $('#symbol-input').val().trim();
                const symbols = value ? value.split(',').map(function(item) { return item.trim().toUpperCase(); }).filter(Boolean) : [];
                $('#symbol-status').text('正在套用...');
                $.ajax({
                    url: '/api/bot-status/set-active-symbols',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({ symbols: symbols }),
                    success: function(res) {
                        $('#symbol-status').text(`已套用: ${res.active_symbols.join(', ')}`);
                        updateStatus();
                    },
                    error: function(xhr) {
                        $('#symbol-status').text(`套用失敗: ${xhr.responseJSON?.detail || '請稍後再試'}`);
                    }
                });
            });

            updateStatus();
            setInterval(updateStatus, 5000);
        });
    </script>
</body>
</html>
