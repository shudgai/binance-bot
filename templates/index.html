<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binance Bot Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-card: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-glow: #38bdf8;
            --accent-success: #10b981;
            --accent-danger: #ef4444;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at top right, rgba(56, 189, 248, 0.1), transparent 40%),
                              radial-gradient(circle at bottom left, rgba(16, 185, 129, 0.1), transparent 40%);
        }

        .container {
            max-width: 900px;
            width: 100%;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 30px;
            text-align: center;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6);
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--text-main);
        }

        .hint {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 16px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 0.875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge.running {
            background: rgba(16, 185, 129, 0.2);
            color: var(--accent-success);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .badge.stopped {
            background: rgba(239, 68, 68, 0.2);
            color: var(--accent-danger);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .meta {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .meta span {
            background: rgba(255, 255, 255, 0.05);
            padding: 4px 10px;
            border-radius: 6px;
        }

        .symbol-form {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }

        .symbol-form input {
            flex: 1;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .symbol-form input:focus {
            border-color: var(--accent-glow);
        }

        button {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.3s, transform 0.2s;
        }

        button:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }

        button.btn-danger {
            background: linear-gradient(135deg, #ef4444, #f43f5e);
            padding: 8px 16px;
            font-size: 0.875rem;
        }

        .position-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin-bottom: 12px;
            transition: background 0.3s;
        }

        .position-row:hover {
            background: rgba(255, 255, 255, 0.06);
        }

        .position-details {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .position-symbol {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .position-qty {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        .loading {
            animation: pulse 1.5s infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Trading Platform</h1>

        <div class="card">
            <div class="card-title">系統狀態</div>
            <div id="status-text" class="loading">
                <span class="badge">載入中...</span>
            </div>
            <div id="status-meta" class="meta"></div>
        </div>

        <div class="card">
            <div class="card-title">幣種池管理</div>
            <div class="hint">輸入 10 個幣種，若某幣種仍在交易中，系統會先保留它，不會強制替換。</div>
            <div class="symbol-form">
                <input id="symbol-input" type="text" placeholder="例如: XRPUSDT,DOGEUSDT,ADAUSDT" />
                <button id="apply-symbols-btn" type="button">套用幣種池</button>
            </div>
            <div id="symbol-status" class="meta" style="margin-top: 16px; min-height: 24px;"></div>
        </div>

        <div class="card">
            <div class="card-title">當前持倉</div>
            <div id="position-info">
                <div class="position-row loading" style="justify-content: center; color: var(--text-muted);">
                    讀取中...
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $(document).ready(function() {
            function renderStatus(botStatus, positions) {
                const statusText = $('#status-text');
                const statusMeta = $('#status-meta');
                const positionDiv = $('#position-info');
                positionDiv.empty();

                const hasOpenPosition = Object.values(positions || {}).some(function(position) {
                    return Number(position.quantity || position.qty || 0) > 0;
                });

                let stateText = '機器人已停止';
                let stateClass = 'stopped';
                if (botStatus && botStatus.is_running) {
                    stateText = hasOpenPosition ? '已開倉' : '監控中，等待進場';
                    stateClass = 'running';
                }

                statusText.html(`<span class="badge ${stateClass}">${stateText}</span>`);

                const metaItems = [];
                if (botStatus) {
                    metaItems.push(`<span>機器人: ${botStatus.is_running ? '運行中' : '已停止'}</span>`);
                    if (botStatus.active_symbols && botStatus.active_symbols.length) {
                        metaItems.push(`<span>目標幣種: ${botStatus.active_symbols.join(', ')}</span>`);
                    }
                    if (botStatus.regime) {
                        metaItems.push(`<span>市場狀態: ${botStatus.regime}</span>`);
                    }
                }
                statusMeta.html(metaItems.join(''));

                const symbols = Object.keys(positions || {});
                let positionCount = 0;

                symbols.forEach(function(symbol) {
                    let position = positions[symbol] || {};
                    let quantity = Number(position.quantity || position.qty || 0);
                    
                    if (quantity <= 0) return; // 隱藏已經平倉的項目
                    
                    positionCount++;

                    let row = $('<div class="position-row"></div>');
                    let details = $('<div class="position-details"></div>');
                    details.append(`<span class="position-symbol">${symbol}</span>`);
                    details.append(`<span class="position-qty">數量: ${quantity} | 方向: ${position.position_side || '持倉中'}</span>`);
                    
                    row.append(details);
                    
                    let closeButton = $('<button type="button" class="btn-danger">平倉</button>');
                    closeButton.click(function() {
                        if(confirm(`確定要將 ${symbol} 平倉嗎？`)) {
                            alert(`${symbol} 平倉操作已觸發！`);
                            // 若這裡有實際的平倉 API 呼叫，可以加在這裡
                        }
                    });
                    row.append(closeButton);

                    positionDiv.append(row);
                });

                if (positionCount === 0) {
                    positionDiv.append('<div class="position-row" style="justify-content: center; color: var(--text-muted);">目前沒有持倉資料</div>');
                }
            }

            function updateStatus() {
                $.when(
                    $.get('/api/bot-status'),
                    $.get('/api/positions')
                ).done(function(botStatus, positions) {
                    renderStatus(botStatus[0], positions[0]);
                }).fail(function() {
                    $('#status-text').html('<span class="badge stopped">連線失敗</span>');
                    $('#status-meta').html('<span>請確認服務是否正常啟動</span>');
                });
            }

            $('#apply-symbols-btn').click(function() {
                const value = $('#symbol-input').val().trim();
                const symbols = value ? value.split(',').map(function(item) { return item.trim().toUpperCase(); }).filter(Boolean) : [];
                
                const statusDiv = $('#symbol-status');
                statusDiv.html('<span>正在套用...</span>');
                
                $.ajax({
                    url: '/api/bot-status/set-active-symbols',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({ symbols: symbols }),
                    success: function(res) {
                        statusDiv.html(`<span style="color: var(--accent-success);">已套用: ${res.active_symbols.join(', ')}</span>`);
                        updateStatus();
                        setTimeout(() => statusDiv.empty(), 3000);
                    },
                    error: function(xhr) {
                        statusDiv.html(`<span style="color: var(--accent-danger);">套用失敗: ${xhr.responseJSON?.detail || '請稍後再試'}</span>`);
                    }
                });
            });

            updateStatus();
            setInterval(updateStatus, 5000);
        });
    </script>
</body>
</html>
