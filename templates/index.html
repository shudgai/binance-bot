<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>交易平台</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 24px; line-height: 1.5; }
        .card { border: 1px solid #ddd; border-radius: 10px; padding: 14px 16px; margin-bottom: 16px; }
        .badge { display: inline-block; padding: 4px 10px; border-radius: 999px; font-size: 12px; font-weight: bold; }
        .badge.running { background: #e8f8ef; color: #0a7d3e; }
        .badge.stopped { background: #fceaea; color: #c62828; }
        .meta { color: #666; font-size: 14px; margin-top: 6px; }
        .position-row { margin-bottom: 8px; }
        button { margin-left: 8px; }
        .symbol-form { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
        .symbol-form input { flex: 1; min-width: 280px; padding: 8px 10px; }
        .hint { color: #666; font-size: 13px; margin-top: 6px; }
    </style>
</head>
<body>
    <h1>交易平台</h1>

    <div class="card">
        <div id="status-text">載入中...</div>
        <div id="status-meta" class="meta"></div>
    </div>

    <div class="card">
        <strong>幣種池管理</strong>
        <div class="hint">輸入 10 個幣種，若某幣種仍在交易中，系統會先保留它，不會強制替換。</div>
        <div class="symbol-form">
            <input id="symbol-input" type="text" placeholder="例如: BTCUSDT,ETHUSDT,SOLUSDT" />
            <button id="apply-symbols-btn" type="button">套用幣種池</button>
        </div>
        <div id="symbol-status" class="meta"></div>
    </div>

    <div class="card" id="strategy-panel">
        <strong>⚙️ 策略參數設定 (動態熱更新)</strong>
        <div class="hint">免重啟即時切換機器人的攻擊與防禦性。</div>
        <div style="margin-top: 10px; margin-bottom: 10px;">
            <button id="btn-loose-mode" type="button" style="background-color: #0a7d3e; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; margin-left: 0;">⚡ 一鍵：極速寬鬆模式 (機槍手)</button>
            <button id="btn-strict-mode" type="button" style="background-color: #c62828; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer;">🎯 一鍵：保守狙擊模式 (狙擊手)</button>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 14px;">
            <div><label>Fast Path (低波動):</label> <input id="conf-fast-path-low" type="number" step="0.1" style="width: 60px;"></div>
            <div><label>Fast Path (高波動):</label> <input id="conf-fast-path-high" type="number" step="0.1" style="width: 60px;"></div>
            <div><label>最低開倉分數:</label> <input id="conf-score-min" type="number" step="0.1" style="width: 60px;"></div>
            <div><label>ADX 門檻:</label> <input id="conf-adx" type="number" step="0.1" style="width: 60px;"></div>
            <div><label>全域冷卻 (秒):</label> <input id="conf-cooldown" type="number" style="width: 60px;"></div>
            <div><label>AI 新鮮度倍數:</label> <input id="conf-ai-fresh" type="number" style="width: 60px;"></div>
        </div>
        <div style="margin-top: 10px;">
            <button id="btn-save-strategy" type="button" style="margin-left: 0;">💾 儲存自訂設定</button>
            <span id="strategy-status" class="meta" style="margin-left: 10px;"></span>
        </div>
    </div>

    <div id="position-info" class="card"></div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $(document).ready(function() {
            function renderStatus(botStatus, positions) {
                const statusText = $('#status-text');
                const statusMeta = $('#status-meta');
                const positionDiv = $('#position-info');
                positionDiv.empty();

                const hasOpenPosition = Object.values(positions || {}).some(function(position) {
                    return Number(position.quantity || position.qty || 0) > 0;
                });

                let stateText = '機器人已停止';
                let stateClass = 'stopped';
                if (botStatus && botStatus.is_running) {
                    stateText = hasOpenPosition ? '已開倉' : '監控中，等待進場';
                    stateClass = 'running';
                }

                statusText.html(`<span class="badge ${stateClass}">${stateText}</span>`);

                const metaItems = [];
                if (botStatus) {
                    metaItems.push(`機器人: ${botStatus.is_running ? '運行中' : '已停止'}`);
                    if (botStatus.active_symbols && botStatus.active_symbols.length) {
                        metaItems.push(`目標幣種: ${botStatus.active_symbols.join(', ')}`);
                    }
                    if (botStatus.regime) {
                        metaItems.push(`市場狀態: ${botStatus.regime}`);
                    }
                }
                statusMeta.text(metaItems.join(' | '));

                const symbols = Object.keys(positions || {});
                if (symbols.length === 0) {
                    positionDiv.append('<div class="position-row">目前沒有持倉資料</div>');
                    return;
                }

                symbols.forEach(function(symbol) {
                    let position = positions[symbol] || {};
                    let quantity = Number(position.quantity || position.qty || 0);
                    let row = $('<div class="position-row"></div>');

                    if (quantity > 0) {
                        row.append(`<span>${symbol}: ${quantity} (${position.position_side || '持倉中'})</span>`);
                        let closeButton = $('<button type="button">平倉</button>');
                        closeButton.click(function() {
                            alert(`${symbol} 平倉操作已觸發！`);
                        });
                        row.append(closeButton);
                    } else {
                        row.append(`<span>${symbol}: 已完成交易</span>`);
                    }

                    positionDiv.append(row);
                });
            }

            function updateStatus() {
                $.when(
                    $.get('/api/bot-status'),
                    $.get('/api/positions')
                ).done(function(botStatus, positions) {
                    renderStatus(botStatus[0], positions[0]);
                }).fail(function() {
                    $('#status-text').text('讀取狀態失敗');
                    $('#status-meta').text('請確認服務是否正常啟動');
                });
            }

            $('#apply-symbols-btn').click(function() {
                const value = $('#symbol-input').val().trim();
                const symbols = value ? value.split(',').map(function(item) { return item.trim().toUpperCase(); }).filter(Boolean) : [];
                $('#symbol-status').text('正在套用...');
                $.ajax({
                    url: '/api/bot-status/set-active-symbols',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({ symbols: symbols }),
                    success: function(res) {
                        $('#symbol-status').text(`已套用: ${res.active_symbols.join(', ')}`);
                        updateStatus();
                    },
                    error: function(xhr) {
                        $('#symbol-status').text(`套用失敗: ${xhr.responseJSON?.detail || '請稍後再試'}`);
                    }
                });
            });

            // Strategy Config Logic
            let currentStrategy = {};

            function renderStrategyConfig(config) {
                currentStrategy = config;
                $('#conf-fast-path-low').val(config.FAST_PATH_SCORE_LOW_VOL);
                $('#conf-fast-path-high').val(config.FAST_PATH_SCORE_HIGH_VOL);
                $('#conf-score-min').val(config.ENTRY_SCORE_MIN);
                $('#conf-adx').val(config.ADX_MIN_THRESHOLD);
                $('#conf-cooldown').val(config.ENTRY_COOLDOWN_GLOBAL_SEC);
                $('#conf-ai-fresh').val(config.AI_FRESHNESS_MULTIPLIER);
            }

            function loadStrategyConfig() {
                $.get('/api/strategy-config', function(res) {
                    if (res.status === 'success') {
                        renderStrategyConfig(res.data);
                    }
                });
            }

            function saveStrategyConfig(newConfig) {
                $('#strategy-status').text('儲存中...').css('color', '#666');
                $.ajax({
                    url: '/api/strategy-config',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify(newConfig),
                    success: function() {
                        $('#strategy-status').text('✅ 設定已即時套用！').css('color', '#0a7d3e');
                        setTimeout(() => $('#strategy-status').text(''), 3000);
                        renderStrategyConfig(newConfig);
                    },
                    error: function() {
                        $('#strategy-status').text('❌ 儲存失敗').css('color', '#c62828');
                    }
                });
            }

            $('#btn-save-strategy').click(function() {
                const updatedConfig = Object.assign({}, currentStrategy, {
                    FAST_PATH_SCORE_LOW_VOL: parseFloat($('#conf-fast-path-low').val()),
                    FAST_PATH_SCORE_HIGH_VOL: parseFloat($('#conf-fast-path-high').val()),
                    ENTRY_SCORE_MIN: parseFloat($('#conf-score-min').val()),
                    ADX_MIN_THRESHOLD: parseFloat($('#conf-adx').val()),
                    ENTRY_COOLDOWN_GLOBAL_SEC: parseInt($('#conf-cooldown').val()),
                    AI_FRESHNESS_MULTIPLIER: parseInt($('#conf-ai-fresh').val())
                });
                saveStrategyConfig(updatedConfig);
            });

            $('#btn-loose-mode').click(function() {
                const looseConfig = Object.assign({}, currentStrategy, {
                    FAST_PATH_SCORE_LOW_VOL: 14.0,
                    FAST_PATH_SCORE_HIGH_VOL: 17.0,
                    ENTRY_SCORE_MIN: 6.0,
                    ADX_MIN_THRESHOLD: 5.0,
                    ENTRY_COOLDOWN_GLOBAL_SEC: 120,
                    AI_FRESHNESS_MULTIPLIER: 4
                });
                saveStrategyConfig(looseConfig);
            });

            $('#btn-strict-mode').click(function() {
                const strictConfig = Object.assign({}, currentStrategy, {
                    FAST_PATH_SCORE_LOW_VOL: 17.0,
                    FAST_PATH_SCORE_HIGH_VOL: 20.0,
                    ENTRY_SCORE_MIN: 8.0,
                    ADX_MIN_THRESHOLD: 10.0,
                    ENTRY_COOLDOWN_GLOBAL_SEC: 300,
                    AI_FRESHNESS_MULTIPLIER: 2
                });
                saveStrategyConfig(strictConfig);
            });

            loadStrategyConfig();
            updateStatus();
            setInterval(updateStatus, 5000);
        });
    </script>
</body>
</html>
